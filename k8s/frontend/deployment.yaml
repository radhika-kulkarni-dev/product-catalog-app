apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: product-catalog-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/radhika-kulkarni-dev/product-catalog-frontend:latest
          ports:
            - containerPort: 80